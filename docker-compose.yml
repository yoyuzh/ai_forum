services:
  api-server:
    build:
      context: ./backend
    command: ["./api-server"]
    environment: &backend-env
      SERVER_MODE: debug
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ai_forum_root
      MYSQL_DATABASE: ai_forum
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ES_ADDRESSES: http://elasticsearch:9200
      JWT_SECRET: local-dev-jwt-secret
      INTERNAL_API_TOKEN: local-dev-internal-token
      AI_API_KEY: local-dev-ai-key
    expose:
      - "8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - elasticsearch

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "19091:80"
    depends_on:
      - api-server

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_MODE: real
      VITE_API_BASE_URL: http://127.0.0.1:19091
    ports:
      - "5173:5173"
    depends_on:
      - nginx

  admin:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_MODE: real
      VITE_API_BASE_URL: http://127.0.0.1:19091
    ports:
      - "5174:5174"
    depends_on:
      - nginx

  worker-service:
    build:
      context: ./backend
    command: ["./worker-service"]
    environment: *backend-env
    depends_on:
      - api-server
      - mysql
      - redis
      - rabbitmq
      - elasticsearch

  outbox-publisher:
    build:
      context: ./backend
    command: ["./outbox-publisher"]
    environment: *backend-env
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - elasticsearch

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ai_forum
      MYSQL_USER: ai_forum
      MYSQL_PASSWORD: ai_forum
      MYSQL_ROOT_PASSWORD: ai_forum_root
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    # Install the IK Chinese analyzer plugin at container start. IK is an
    # install-time requirement, not rebuildable data: ES without IK cannot do
    # Chinese search, and the search.NewES readiness gate FAILS when IK is
    # absent (P2 design D2). The plugin version MUST match the ES image
    # version (8.14.3). The `elasticsearch-plugin list` check makes the step
    # idempotent so container restarts do not re-download. --batch skips the
    # interactive confirmation prompt.
    entrypoint:
      - bash
      - -c
      - |
        if ! bin/elasticsearch-plugin list | grep -q analysis-ik; then
          bin/elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.14.3.zip
        fi
        exec docker-entrypoint.sh
    ports:
      - "9200:9200"

volumes:
  web_node_modules:
  admin_node_modules:
