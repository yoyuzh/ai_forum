services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ai_forum
      MYSQL_USER: ai_forum
      MYSQL_PASSWORD: ai_forum
      MYSQL_ROOT_PASSWORD: ai_forum_root
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ai_forum
      RABBITMQ_DEFAULT_PASS: ai_forum
    ports:
      - "5672:5672"
      - "15672:15672"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
